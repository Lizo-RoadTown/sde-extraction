# Dagster OSS instance config (read from $DAGSTER_HOME/dagster.yaml).
#
# Storage = the EXISTING Supabase Postgres (reused, per decision) so run/event/schedule history
# persists across deploys. Validated safe (validator subagent, 2026-06-19) ONLY with schema isolation:
# Dagster lives in its OWN `dagster` schema, NOT public — the app keeps public to itself, and Supabase
# does not auto-expose Dagster's ~22 tables via PostgREST. `search_path=dagster` is pinned here so it
# cannot be forgotten. PREREQ: run `CREATE SCHEMA IF NOT EXISTS dagster;` once in Supabase first
# (Dagster creates its tables, not the schema).
#
# Connection: use the Supabase SESSION pooler (port 5432, IPv4) — NOT the transaction pooler (6543).
# All five DAGSTER_PG_* values are dashboard-managed secrets on Render (sync:false).
storage:
  postgres:
    postgres_db:
      username:
        env: DAGSTER_PG_USER
      password:
        env: DAGSTER_PG_PASSWORD
      hostname:
        env: DAGSTER_PG_HOST
      db_name:
        env: DAGSTER_PG_DB
      port:
        env: DAGSTER_PG_PORT
      params:
        options: "-c search_path=dagster"

# Skeleton deploy = one web service, default in-process run launcher (runs spawn as subprocesses in
# the webserver container). No daemon yet — add a QueuedRunCoordinator + dagster-daemon service when
# schedules/sensors are introduced.

telemetry:
  enabled: false
