# Render Blueprint — deploys the extraction worker as a background worker (no inbound
# traffic), built from its Dockerfile. Syntax verified against render.com/docs/blueprint-spec
# (2026-06-12): type=worker, runtime=docker.
#
# This is the FIRST infra-as-code in the repo. It covers ONLY the worker. The dashboard
# (apps/dashboard) deploys separately on VERCEL (project "sde-extraction", auto-deploy on
# push to main) — it is not a Render service and is not declared here.
#
# Secrets (OPENAI_API_KEY, DATABASE_URL, SUPABASE_*) are NOT committed — set them in the
# Render dashboard (sync:false marks them as dashboard-managed).
services:
  - name: sde-extraction-worker
    type: worker
    runtime: docker
    rootDir: ./services/extraction
    dockerfilePath: ./Dockerfile
    dockerContext: ./services/extraction
    autoDeploy: true
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: POLL_INTERVAL
        value: "30"
      - key: OPENAI_MODEL
        value: gpt-4o-2024-08-06
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

  # The Dagster orchestrator webserver (skeleton deploy). Build context is the REPO ROOT because the
  # image needs BOTH services/orchestration and services/extraction (the ../extraction import shim).
  # Storage reuses the existing Supabase Postgres, but isolated to the `dagster` schema (see
  # services/orchestration/dagster.yaml). Set the five DAGSTER_PG_* secrets to the Supabase SESSION
  # pooler (port 5432, IPv4) values; PREREQ: `CREATE SCHEMA IF NOT EXISTS dagster;` once. Render injects $PORT.
  - name: sde-orchestration-web
    type: web
    runtime: docker
    dockerfilePath: ./services/orchestration/Dockerfile
    dockerContext: .
    autoDeploy: true
    envVars:
      - key: DAGSTER_PG_HOST
        sync: false
      - key: DAGSTER_PG_PORT
        sync: false
      - key: DAGSTER_PG_USER
        sync: false
      - key: DAGSTER_PG_PASSWORD
        sync: false
      - key: DAGSTER_PG_DB
        sync: false
