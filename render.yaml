# Render Blueprint — deploys the extraction worker as a background worker (no inbound
# traffic), built from its Dockerfile. Syntax verified against render.com/docs/blueprint-spec
# (2026-06-12): type=worker, runtime=docker.
#
# This is the FIRST infra-as-code in the repo. It covers ONLY the worker. The dashboard
# (apps/dashboard) deploys separately on VERCEL (project "sde-extraction", auto-deploy on
# push to main) — it is not a Render service and is not declared here.
#
# Secrets (OPENAI_API_KEY, DATABASE_URL, SUPABASE_*) are NOT committed — set them in the
# Render dashboard (sync:false marks them as dashboard-managed).
services:
  # TEST BRANCH worker — the SAME extraction worker as main, but with EXTRACTION_ENGINE=dagster, so it
  # runs each job through the Dagster-orchestrated pipeline (dagster_flow.run_via_dagster) instead of
  # processor.run directly. Identical app + result; only the orchestration differs (the PI's compare).
  # Named distinctly so it runs ALONGSIDE main's sde-extraction-worker. (Both drain the same Supabase
  # queue — for a clean side-by-side, run one at a time, or we add engine-affinity to claim_next_job.)
  - name: sde-extraction-worker-dagster
    type: worker
    runtime: docker
    rootDir: ./services/extraction
    dockerfilePath: ./Dockerfile
    dockerContext: ./services/extraction
    autoDeploy: true
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: POLL_INTERVAL
        value: "30"
      - key: OPENAI_MODEL
        value: gpt-4o-2024-08-06
      - key: EXTRACTION_ENGINE
        value: dagster
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
