# Render Blueprint — deploys the extraction worker as a background worker (no inbound
# traffic), built from its Dockerfile. Syntax verified against render.com/docs/blueprint-spec
# (2026-06-12): type=worker, runtime=docker.
#
# This is the FIRST infra-as-code in the repo. It covers ONLY the worker. The dashboard
# (apps/dashboard) deploys separately on VERCEL (project "sde-extraction", auto-deploy on
# push to main) — it is not a Render service and is not declared here.
#
# Secrets (OPENAI_API_KEY, DATABASE_URL, SUPABASE_*) are NOT committed — set them in the
# Render dashboard (sync:false marks them as dashboard-managed).
services:
  # PRODUCTION worker — the direct path: processor.run on the public schema (no APP_SCHEMA,
  # EXTRACTION_ENGINE defaults to "direct"). Drains public.extraction_jobs. This is the worker the
  # OpenAI/Pydantic path uses; it must stay declared so the production extraction path keeps running.
  - name: sde-extraction-worker
    type: worker
    runtime: docker
    rootDir: ./services/extraction
    dockerfilePath: ./Dockerfile
    dockerContext: ./services/extraction
    autoDeploy: true
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: POLL_INTERVAL
        value: "30"
      - key: OPENAI_MODEL
        value: gpt-4o-2024-08-06
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

  # GATED-FLOW worker — the SAME extraction worker, but EXTRACTION_ENGINE=flow_v2 runs each job through
  # the figure-anchored, per-variable GATED pipeline (read_figure → terms → classify → transform →
  # executable model), not processor.run. Because APP_SCHEMA=dagster_app sets the search_path, it drains
  # dagster_app.extraction_jobs — its OWN queue, SEPARATE from the direct worker's public.extraction_jobs,
  # so the direct path (the PI's baseline) is never touched. A job reaches this worker only when enqueued
  # on the dashboard's gated-flow path. (Flip EXTRACTION_ENGINE back to "dagster" or "direct" to revert.)
  - name: sde-extraction-worker-dagster
    type: worker
    runtime: docker
    rootDir: ./services/extraction
    dockerfilePath: ./Dockerfile
    dockerContext: ./services/extraction
    autoDeploy: true
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: POLL_INTERVAL
        value: "30"
      - key: OPENAI_MODEL
        value: gpt-4o-2024-08-06
      - key: EXTRACTION_ENGINE
        value: flow_v2
      - key: APP_SCHEMA
        value: dagster_app
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
